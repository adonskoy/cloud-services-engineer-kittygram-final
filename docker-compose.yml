services:
  db:
    platform: linux/amd64
    image: postgres:15
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kittygram}
      POSTGRES_USER: ${POSTGRES_USER:-kittygram_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kittygram_password}

  backend:
    build: ./backend
    image: kittygram_backend
    platform: linux/amd64
    env_file: .env
    volumes:
      - static_volume:/app/static_volume
      - media_volume:/app/media
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kittygram}
      POSTGRES_USER: ${POSTGRES_USER:-kittygram_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kittygram_password}
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      - db

  frontend:
    build: ./frontend
    image: kittygram_frontend
    platform: linux/amd64
    volumes:
      - static_volume:/app/static_dist
    command: >
      sh -c "cp -r /app/build/. /app/static_dist/ &&
             tail -f /dev/null"
    depends_on:
      - backend

  nginx:
    build: ./nginx
    image: kittygram_gateway
    platform: linux/amd64
    ports:
      - "80:80"
    volumes:
      - static_volume:/static:ro
      - media_volume:/app/media:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:
